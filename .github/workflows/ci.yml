name: CI
on: pull_request
jobs:
  guardrails:
    uses: blueworx-io/bluegroup_core_foundation/.github/workflows/ci-wordpress.yml@main
    with:
      plugin_slug: blueworx-labs-wordpress
      # Provision a disposable WordPress on the runner rather than pointing at a
      # staging host. See docs/wordpress-test-harness.md in the foundation.
      use_local_wordpress: true
      # This plugin moves the login screen off wp-login.php, which 301s away.
      # Without this every admin spec fails at the sign-in step.
      wp_login_path: admin_login
    secrets: inherit
